{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crumb</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Vina+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Vina+Sans&display=swap" rel="stylesheet">

    <!-- Fontawesome -->
    <script src="https://kit.fontawesome.com/c1eb0bcc3f.js" crossorigin="anonymous"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="navbar-box">
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid px-4">                
                <!-- Logo Alanı -->
                <a class="navbar-logo text-decoration-none" href="{% url 'home' %}">
                    <img src="{% static 'images/logo.png' %}" alt="crumb logo">
                </a>              
                
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                    <i class="fa-solid fa-bars" style="color: var(--secondary-color);"></i> 
                </button>

                <div class="collapse navbar-collapse" id="navbarMenu">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item">
                            <a class="nav-link px-3" href="#">MENU</a>
                        </li>
                        <li class="nav-item">                           
                            <a class="nav-link px-3" href="#">CONTACT-US</a>
                        </li>

                        {% if request.user.is_authenticated %}
                            <li class="nav-item">
                                <a class="nav-link px-3" href="#">SIGN-OUT</a>
                            </li>
                        {% else %}
                            <li class="nav-item">
                                <a class="nav-link px-3" href="#">SIGN-IN</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link px-3" href="#">REGISTER</a>
                            </li>
                        {% endif %}

                        <li class="nav-item">
                            <a class="nav-link px-3" href="#">SHOP</a>
                        </li>                        
                        <li class="nav-item">
                            <a class="nav-link ps-3 position-relative cart-icon" href="#">
                                <i class="fa-solid fa-cart-shopping fs-5"></i>
                                {% if product_count %}
                                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">
                                        {{ product_count }}
                                    </span>
                                {% endif %}
                            </a>
                        </li>
                    </ul>                
                </div>
            </div>
        </nav>
    </div>
    <main class="outer-box">
        {% block content %}
        {% endblock %}
    </main>
</body>
